<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)"/>
  
  <!-- Inner circle for depth -->
  <circle cx="50" cy="50" r="40" fill="url(#grad2)" opacity="0.3"/>
  
  <!-- Letter R stylized -->
  <text x="50" y="68" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">R</text>
  
  <!-- AI circuit lines -->
  <path d="M25 35 L35 35 L35 25" stroke="white" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M75 35 L65 35 L65 25" stroke="white" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M25 65 L35 65 L35 75" stroke="white" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M75 65 L65 65 L65 75" stroke="white" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- AI nodes -->
  <circle cx="25" cy="35" r="3" fill="white" opacity="0.8"/>
  <circle cx="75" cy="35" r="3" fill="white" opacity="0.8"/>
  <circle cx="25" cy="65" r="3" fill="white" opacity="0.8"/>
  <circle cx="75" cy="65" r="3" fill="white" opacity="0.8"/>
</svg>